<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settlements Trabajables</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<main>
<div class="toolbar">
<div>
<h2 id="reportTitle">Reporte diario</h2>
<p class="muted" id="reportSource">Fuente: DebtManager + HubSpot</p>
</div>
<input class="search" id="searchInput" type="search" placeholder="Buscar cliente, ID, SID, acreedor o etapa">
</div>

<div id="metrics"></div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>
</main>
</div>

<script>
const API_URL = "https://settlements-trabajables-production.up.railway.app";
const FONDOS_MINIMO = 40;
const ALTA_PRIORIDAD_DESDE = 5000;
const MEDIA_PRIORIDAD_DESDE = 2000;

const state = {
debtRows: [],
hubRows: [],
creditorRules: [],
creditorIndex: new Map(),
report: null,
tab: "ready",
search: "",
selectedClientKey: ""
};

const fieldAliases = {
client_id: ["client id", "clientid", "customer id", "id cliente", "id", "account id", "dm id"],
client: ["client", "client name", "customer", "customer name", "name", "nombre", "cliente"],
sid: ["sid", "ssn", "social", "social security", "settlement id"],
month: ["month", "months", "program month", "month completed in the program", "mes", "mes programa"],
escrow: ["escrow", "escrow balance", "available escrow", "available funds", "available funds in escrow account", "current month available", "funds", "balance escrow", "fondos", "escrow available"],
original_creditor: ["original creditor", "creditor original"],
collection_agency: ["collection agency", "agency", "collector", "agencia de coleccion", "agencia de coleccion"],
creditor: ["creditor", "creditor name", "account", "debt", "acreedor", "nombre acreedor"],
debt_balance: ["balance", "current balance", "current account balance", "creditor balance", "debt balance", "account balance", "principal", "monto deuda", "deuda", "amount owed"],
status: ["status", "client status", "estado", "estatus"],
deal_name: ["deal name", "deal", "nombre del negocio", "nombre negocio"],
pipeline: ["pipeline", "canalizacion", "canalizacion"],
stage: ["deal stage", "stage", "etapa", "dealstage"],
owner: ["deal owner", "owner", "propietario", "hubspot owner"]
};

const els = {
metrics: document.getElementById("metrics"),
tabs: document.getElementById("tabs"),
content: document.getElementById("content"),
searchInput: document.getElementById("searchInput"),
reportTitle: document.getElementById("reportTitle"),
reportSource: document.getElementById("reportSource")
};

function normalizeKey(value) {
return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, " ").trim();
}

function canonicalKey(header) {
const normalized = normalizeKey(header);
for (const [key, aliases] of Object.entries(fieldAliases)) {
if (aliases.some(alias => normalizeKey(alias) === normalized)) return key;
}
return normalized.replace(/\s+/g, "_");
}

function moneyToNumber(value) {
if (typeof value === "number") return Number.isFinite(value) ? value : 0;
const cleaned = String(value || "").replace(/\((.*)\)/, "-$1").replace(/[\$,%\s,]/g, "");
const parsed = Number(cleaned);
return Number.isFinite(parsed) ? parsed : 0;
}

function cleanText(value) { return String(value || "").trim(); }

async function loadFromApi() {
const [negotiatorResponse] = await Promise.all([
fetch(API_URL + "/data/negotiator-escrow"),
fetch(API_URL + "/data/summary").catch(() => null)
]);
if (!negotiatorResponse.ok) throw new Error("FastAPI respondio " + negotiatorResponse.status);
const negotiator = await negotiatorResponse.json();
state.debtRows = (negotiator.records || []).map(row => normalizeIncomingRow(row));
buildReport();
}

function normalizeIncomingRow(row) {
const normalized = {};
for (const [key, value] of Object.entries(row)) { normalized[canonicalKey(key)] = value; }
return normalized;
}

function normalizeDebtRow(row) {
const originalCreditor = cleanText(row.original_creditor);
const collectionAgency = cleanText(row.collection_agency);
const creditor = cleanText(row.creditor) || collectionAgency || originalCreditor;
return { clientId: cleanText(row.client_id), client: cleanText(row.client), sid: cleanText(row.sid), month: moneyToNumber(row.month), escrow: moneyToNumber(row.escrow), creditor, originalCreditor, collectionAgency, balance: moneyToNumber(row.debt_balance), status: cleanText(row.status) };
}

function buildReport() {
const debtRows = state.debtRows.map(normalizeDebtRow).filter(row => row.client || row.clientId || row.creditor);
const clients = new Map();
for (const row of debtRows) {
if (row.status && normalizeKey(row.status) !== "active") continue;
if (!row.balance) continue;
const key = row.clientId || row.sid || normalizeKey(row.client);
if (!key) continue;
if (!clients.has(key)) clients.set(key, { clientId: row.clientId, client: row.client || "(cliente)", sid: row.sid, month: row.month, escrow: row.escrow, clientStatus: row.status, debts: [] });
const client = clients.get(key);
client.escrow = Math.max(client.escrow || 0, row.escrow || 0);
const percent = row.balance ? (client.escrow / row.balance) * 100 : 0;
if (percent >= FONDOS_MINIMO) client.debts.push({ creditor: row.creditor || "(acreedor)", originalCreditor: row.originalCreditor, collectionAgency: row.collectionAgency, balance: row.balance, percent });
}
const prepared = [...clients.values()].map(client => {
const readyDebts = client.debts.filter(debt => debt.percent >= 100);
const strongDebts = client.debts.filter(debt => debt.percent >= 70 && debt.percent < 100);
const viableDebts = client.debts.filter(debt => debt.percent >= 50 && debt.percent < 70);
const tier = readyDebts.length ? "ready" : strongDebts.length ? "strong" : viableDebts.length ? "viable" : "watch";
return { ...client, key: client.clientId || client.sid || normalizeKey(client.client), debts: client.debts, readyDebts, strongDebts, viableDebts, tier };
}).filter(client => client.debts.length);
const byEscrow = (a, b) => b.escrow - a.escrow;
state.report = { date: new Date(), clients: prepared.sort(byEscrow), ready: prepared.filter(c => c.tier === "ready").sort(byEscrow), strong: prepared.filter(c => c.tier === "strong").sort(byEscrow), viable: prepared.filter(c => c.tier === "viable").sort(byEscrow), watch: prepared.filter(c => c.tier === "watch").sort(byEscrow) };
state.report.metrics = { readyClients: state.report.ready.length, strongClients: state.report.strong.length, viableClients: state.report.viable.length, activeClients: prepared.length };
render();
}

function formatMoney(value) { return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value || 0); }
function escapeHtml(value) { return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function render() {
if (!state.report) {
els.content.innerHTML = '<div class="section"><div class="empty">Cargando datos...</div></div>';
return;
}
const m = state.report.metrics;
els.metrics.innerHTML = [["Clientes activos", m.activeClients], ["Listos", m.readyClients], ["Fuertes", m.strongClients], ["Viables", m.viableClients]].map(([l, v]) => '<div class="metric"><strong>' + v + '</strong><span>' + l + '</span></div>').join("");
const tabs = [["ready", "Listos (" + state.report.ready.length + ")"], ["strong", "Fuertes (" + state.report.strong.length + ")"], ["viable", "Viables (" + state.report.viable.length + ")"], ["watch", "40-49% (" + state.report.watch.length + ")"]];
els.tabs.innerHTML = tabs.map(([id, label]) => '<button class="tab ' + (state.tab === id ? "active" : "") + '" data-tab="' + id + '">' + label + '</button>').join("");
els.tabs.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => { state.tab = b.dataset.tab; render(); }));
renderTable();
}

function renderTable() {
const rows = state.report[state.tab] || [];
const q = normalizeKey(state.search);
const filtered = q ? rows.filter(c => normalizeKey([c.clientId, c.client, c.sid].join(" ")).includes(q)) : rows;
if (!filtered.length) { els.content.innerHTML = '<div class="section"><div class="empty">No hay resultados.</div></div>'; return; }
els.content.innerHTML = '<section class="section"><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>ID</th><th>Escrow</th><th>Deudas 100%+</th></tr></thead><tbody>' + filtered.map(c => '<tr><td>' + escapeHtml(c.client) + '</td><td>' + escapeHtml(c.clientId || "-") + '</td><td><strong>' + formatMoney(c.escrow) + '</strong></td><td>' + c.readyDebts.map(d => escapeHtml(d.creditor) + " " + formatMoney(d.balance)).join(", ") + '</td></tr>').join("") + '</tbody></table></div></section>';
}

els.searchInput.addEventListener("input", e => { state.search = e.target.value; renderTable(); });

async function init() {
render();
try { await loadFromApi(); }
catch (error) { els.content.innerHTML = '<div class="section"><div class="empty">Error al conectar con FastAPI en ' + API_URL + ': ' + escapeHtml(error.message) + '</div></div>'; }
}
init();
</script>
</body>
</html>
