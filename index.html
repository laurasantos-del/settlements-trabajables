<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settlements Trabajables</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <main>
      <div class="toolbar">
        <div>
          <h2 id="reportTitle">Reporte diario</h2>
          <p class="muted" id="reportSource">Fuente: DebtManager + HubSpot</p>
        </div>
        <input class="search" id="searchInput" type="search" placeholder="Buscar cliente, ID, SID, acreedor o etapa">
      </div>

      <div id="metrics"></div>

      <div class="tabs" id="tabs"></div>
      <div id="content"></div>
    </main>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000";
    const FONDOS_MINIMO = 40;
    const ALTA_PRIORIDAD_DESDE = 5000;
    const MEDIA_PRIORIDAD_DESDE = 2000;

    const state = {
      debtRows: [],
      hubRows: [],
      creditorRules: [],
      creditorIndex: new Map(),
      report: null,
      tab: "ready",
      search: "",
      selectedClientKey: ""
    };

    const fieldAliases = {
      client_id: ["client id", "clientid", "customer id", "id cliente", "id", "account id", "dm id"],
      client: ["client", "client name", "customer", "customer name", "name", "nombre", "cliente"],
      sid: ["sid", "ssn", "social", "social security", "settlement id"],
      month: ["month", "months", "program month", "month completed in the program", "mes", "mes programa"],
      escrow: ["escrow", "escrow balance", "available escrow", "available funds", "available funds in escrow account", "current month available", "funds", "balance escrow", "fondos", "escrow available"],
      original_creditor: ["original creditor", "creditor original"],
      collection_agency: ["collection agency", "agency", "collector", "agencia de coleccion", "agencia de colección"],
      creditor: ["creditor", "creditor name", "account", "debt", "acreedor", "nombre acreedor"],
      debt_balance: ["balance", "current balance", "current account balance", "creditor balance", "debt balance", "account balance", "principal", "monto deuda", "deuda", "amount owed"],
      status: ["status", "client status", "estado", "estatus"],
      deal_name: ["deal name", "deal", "nombre del negocio", "nombre negocio"],
      pipeline: ["pipeline", "canalizacion", "canalización"],
      stage: ["deal stage", "stage", "etapa", "dealstage"],
      owner: ["deal owner", "owner", "propietario", "hubspot owner"]
    };

    const els = {
      metrics: document.getElementById("metrics"),
      tabs: document.getElementById("tabs"),
      content: document.getElementById("content"),
      searchInput: document.getElementById("searchInput"),
      reportTitle: document.getElementById("reportTitle"),
      reportSource: document.getElementById("reportSource")
    };

    function normalizeKey(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function canonicalKey(header) {
      const normalized = normalizeKey(header);
      for (const [key, aliases] of Object.entries(fieldAliases)) {
        if (aliases.some(alias => normalizeKey(alias) === normalized)) return key;
      }
      return normalized.replace(/\s+/g, "_");
    }

    function moneyToNumber(value) {
      if (typeof value === "number") return Number.isFinite(value) ? value : 0;
      const cleaned = String(value || "")
        .replace(/\((.*)\)/, "-$1")
        .replace(/[$,%\s,]/g, "");
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function cleanText(value) {
      return String(value || "").trim();
    }

    function normalizeCreditorName(value) {
      return normalizeKey(String(value || "").replace(/\([^)]*\)/g, " "));
    }

    function normalizeDebtRow(row) {
      const originalCreditor = cleanText(row.original_creditor);
      const collectionAgency = cleanText(row.collection_agency);
      const creditor = cleanText(row.creditor) || collectionAgency || originalCreditor;
      return {
        clientId: cleanText(row.client_id),
        client: cleanText(row.client),
        sid: cleanText(row.sid),
        month: moneyToNumber(row.month),
        escrow: moneyToNumber(row.escrow),
        creditor,
        originalCreditor,
        collectionAgency,
        balance: moneyToNumber(row.debt_balance),
        status: cleanText(row.status)
      };
    }

    function normalizeHubRow(row) {
      return {
        clientId: cleanText(row.client_id),
        client: cleanText(row.client),
        sid: cleanText(row.sid),
        dealName: cleanText(row.deal_name),
        pipeline: cleanText(row.pipeline),
        stage: cleanText(row.stage),
        owner: cleanText(row.owner)
      };
    }

    async function loadFromApi() {
      const [negotiatorResponse] = await Promise.all([
        fetch(`${API_URL}/data/negotiator-escrow`),
        fetch(`${API_URL}/data/summary`).catch(() => null)
      ]);

      if (!negotiatorResponse.ok) {
        throw new Error(`FastAPI respondio ${negotiatorResponse.status}. Verifica que uvicorn este corriendo en ${API_URL}.`);
      }

      const negotiator = await negotiatorResponse.json();
      state.debtRows = (negotiator.records || []).map(row => normalizeIncomingRow(row));
      buildReport();
    }

    function normalizeIncomingRow(row) {
      const normalized = {};
      for (const [key, value] of Object.entries(row)) {
        normalized[canonicalKey(key)] = value;
      }
      return normalized;
    }

    async function loadCreditorRules() {
      try {
        const response = await fetch("creditor_rules.json");
        if (!response.ok) throw new Error("No se pudo cargar creditor_rules.json");
        const payload = await response.json();
        state.creditorRules = payload.rules || [];
        state.creditorIndex = buildCreditorIndex(state.creditorRules);
      } catch {
        // creditor_rules.json es opcional; continuar sin reglas
      }
    }

    function buildCreditorIndex(rules) {
      const index = new Map();
      for (const rule of rules) {
        const key = normalizeCreditorName(rule.normalized || rule.name);
        if (key) index.set(key, rule);
      }
      return index;
    }

    function findCreditorRule(debt) {
      const names = [
        debt.collectionAgency,
        debt.originalCreditor,
        debt.creditor,
        ...String(debt.creditor || "").split(/[\/|,-]/)
      ].map(normalizeCreditorName).filter(Boolean);

      for (const name of names) {
        if (state.creditorIndex.has(name)) return state.creditorIndex.get(name);
      }

      for (const name of names) {
        for (const [key, rule] of state.creditorIndex.entries()) {
          if (name.length >= 4 && key.length >= 4 && (name.includes(key) || key.includes(name))) {
            return rule;
          }
        }
      }

      return null;
    }

    function enrichDebt(debt, escrow) {
      const rule = findCreditorRule(debt);
      const estimateMin = rule?.settlementMin ? debt.balance * rule.settlementMin : null;
      const estimateMax = rule?.settlementMax ? debt.balance * rule.settlementMax : null;
      const ruleNegotiable = estimateMax !== null ? escrow >= estimateMax : false;
      return {
        ...debt,
        rule,
        estimateMin,
        estimateMax,
        ruleNegotiable
      };
    }

    function buildReport() {
      const debtRows = state.debtRows.map(normalizeDebtRow).filter(row => row.client || row.clientId || row.creditor);
      const hubRows = state.hubRows.map(normalizeHubRow).filter(row => row.clientId || row.sid || row.client || row.dealName);
      const hubIndex = buildHubIndex(hubRows);
      const clients = new Map();

      for (const row of debtRows) {
        if (row.status && normalizeKey(row.status) !== "active") continue;
        if (!row.balance) continue;
        const key = row.clientId || row.sid || normalizeKey(row.client);
        if (!key) continue;
        if (!clients.has(key)) {
          clients.set(key, {
            clientId: row.clientId,
            client: row.client || "(cliente)",
            sid: row.sid,
            month: row.month,
            escrow: row.escrow,
            clientStatus: row.status,
            debts: []
          });
        }
        const client = clients.get(key);
        client.clientId ||= row.clientId;
        client.client ||= row.client;
        client.sid ||= row.sid;
        client.month = client.month || row.month;
        client.escrow = Math.max(client.escrow || 0, row.escrow || 0);
        const percent = row.balance ? (client.escrow / row.balance) * 100 : 0;
        if (percent >= FONDOS_MINIMO) {
          client.debts.push({
            creditor: row.creditor || "(acreedor)",
            originalCreditor: row.originalCreditor,
            collectionAgency: row.collectionAgency,
            balance: row.balance,
            percent
          });
        }
      }

      const prepared = [...clients.values()].map(client => {
        const readyDebts = client.debts.filter(debt => debt.percent >= 100);
        const strongDebts = client.debts.filter(debt => debt.percent >= 70 && debt.percent < 100);
        const viableDebts = client.debts.filter(debt => debt.percent >= 50 && debt.percent < 70);
        const tier = readyDebts.length ? "ready" : strongDebts.length ? "strong" : viableDebts.length ? "viable" : "watch";
        const priority = tier !== "ready" ? "normal" : client.escrow >= ALTA_PRIORIDAD_DESDE ? "high" : client.escrow >= MEDIA_PRIORIDAD_DESDE ? "medium" : "normal";
        const hub = matchHub(client, hubIndex);
        const enrichedDebts = client.debts.map(debt => enrichDebt(debt, client.escrow));
        return {
          ...client,
          key: client.clientId || client.sid || normalizeKey(client.client),
          debts: enrichedDebts,
          readyDebts: enrichedDebts.filter(debt => debt.percent >= 100),
          strongDebts: enrichedDebts.filter(debt => debt.percent >= 70 && debt.percent < 100),
          viableDebts: enrichedDebts.filter(debt => debt.percent >= 50 && debt.percent < 70),
          pendingDebts: enrichedDebts.filter(debt => debt.percent < 100),
          ruleNegotiableDebts: enrichedDebts.filter(debt => debt.ruleNegotiable),
          tier,
          priority,
          hub
        };
      }).filter(client => client.debts.length);

      const byEscrow = (a, b) => b.escrow - a.escrow;
      const report = {
        date: new Date(),
        clients: prepared.sort(byEscrow),
        ready: prepared.filter(c => c.tier === "ready").sort(byEscrow),
        strong: prepared.filter(c => c.tier === "strong").sort(byEscrow),
        viable: prepared.filter(c => c.tier === "viable").sort(byEscrow),
        watch: prepared.filter(c => c.tier === "watch").sort(byEscrow)
      };
      report.metrics = {
        activeClients: prepared.length,
        individualDebts: prepared.reduce((sum, c) => sum + c.debts.length, 0),
        readyClients: report.ready.length,
        strongClients: report.strong.length,
        viableClients: report.viable.length,
        negotiableToday: prepared.reduce((sum, c) => sum + c.readyDebts.length, 0),
        strongDebts: prepared.reduce((sum, c) => sum + c.strongDebts.length, 0),
        negotiableBalance: prepared.reduce((sum, c) => sum + c.readyDebts.reduce((inner, d) => inner + d.balance, 0), 0),
        missingDeals: prepared.filter(c => !c.hub).length
      };

      state.report = report;
      render();
    }

    function buildHubIndex(rows) {
      const index = new Map();
      for (const row of rows) {
        const keys = [row.clientId, row.sid, normalizeKey(row.client), normalizeKey(row.dealName)].filter(Boolean);
        for (const key of keys) {
          if (!index.has(key)) index.set(key, []);
          index.get(key).push(row);
        }
      }
      return index;
    }

    function matchHub(client, index) {
      const keys = [client.clientId, client.sid, normalizeKey(client.client)].filter(Boolean);
      for (const key of keys) {
        const match = index.get(key);
        if (match && match.length) return match[0];
      }
      return null;
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value || 0);
    }

    function formatPercent(value) {
      return `${Math.round(value || 0)}%`;
    }

    function debtList(debts) {
      if (!debts.length) return "<span class='muted'>-</span>";
      return debts
        .sort((a, b) => b.percent - a.percent)
        .map(debt => `<span class="pill ${debt.percent >= 100 ? "ready" : debt.percent >= 70 ? "strong" : "viable"}">${escapeHtml(debt.creditor)} ${formatMoney(debt.balance)} (${formatPercent(debt.percent)})</span>`)
        .join("");
    }

    function readyDebtPills(debts) {
      if (!debts.length) return "<span class='muted'>—</span>";
      return debts
        .sort((a, b) => b.balance - a.balance)
        .map(debt => `<span class="debt-pill">${escapeHtml(debt.creditor)} ${formatMoney(debt.balance)}</span>`)
        .join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentRows() {
      if (!state.report) return [];
      const rows = state.report[state.tab] || [];
      const query = normalizeKey(state.search);
      if (!query) return rows;
      return rows.filter(client => normalizeKey([
        client.clientId,
        client.client,
        client.sid,
        client.hub?.stage,
        client.hub?.owner,
        ...client.debts.map(debt => debt.creditor)
      ].join(" ")).includes(query));
    }

    function render() {
      if (!state.report) {
        els.metrics.innerHTML = "";
        els.tabs.innerHTML = "";
        els.content.innerHTML = `<div class="section"><div class="empty">Cargando datos...</div></div>`;
        return;
      }

      if (state.selectedClientKey) {
        renderClientProfile();
        return;
      }

      const date = state.report.date.toLocaleDateString("es-DO", { day: "2-digit", month: "long", year: "numeric" });
      els.reportTitle.textContent = `Lista de settlements trabajables`;
      els.reportSource.textContent = `Fecha: ${date} | Fuente: DebtManager`;

      const m = state.report.metrics;
      els.metrics.innerHTML = [
        ["Clientes activos", m.activeClients],
        ["Listos ahora", m.readyClients],
        ["Fuertes", m.strongClients],
        ["Viables", m.viableClients],
        ["Deuda negociable", formatMoney(m.negotiableBalance)]
      ].map(([label, value]) => `<div class="metric"><strong>${value}</strong><span>${label}</span></div>`).join("");

      const tabs = [
        ["ready", `Listos ahora (${state.report.ready.length})`],
        ["strong", `Fuertes (${state.report.strong.length})`],
        ["viable", `Viables (${state.report.viable.length})`],
        ["watch", `40-49% (${state.report.watch.length})`],
        ["missingDeals", `Sin deal (${m.missingDeals})`]
      ];
      els.tabs.innerHTML = tabs.map(([id, label]) => `<button class="tab ${state.tab === id ? "active" : ""}" data-tab="${id}">${label}</button>`).join("");
      els.tabs.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
          state.tab = button.dataset.tab;
          render();
        });
      });

      renderTable();
    }

    function renderTable() {
      let rows = state.tab === "missingDeals"
        ? state.report.clients.filter(client => !client.hub)
        : currentRows();
      if (state.tab === "missingDeals" && state.search) {
        const query = normalizeKey(state.search);
        rows = rows.filter(client => normalizeKey(`${client.clientId} ${client.client} ${client.sid}`).includes(query));
      }
      if (!rows.length) {
        els.content.innerHTML = `<div class="section"><div class="empty">No hay resultados para esta vista.</div></div>`;
        return;
      }

      const title = {
        ready: "Tier 1 - Listos ahora",
        strong: "Tier 2 - Fuertes",
        viable: "Tier 3 - Viables",
        watch: "Fondos entre 40% y 49%",
        missingDeals: "Clientes sin deal abierto en HubSpot"
      }[state.tab];

      els.content.innerHTML = `
        <section class="section">
          <div class="section-head">
            <div>
              <h2>${title}</h2>
              <p>${rows.length} clientes ordenados por escrow disponible.</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Status</th>
                  <th>Balance</th>
                  <th>Deudas listas</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((client) => `
                  <tr>
                    <td>
                      <button class="client-link" type="button" data-client-key="${escapeHtml(client.key)}"><span class="client-name">${escapeHtml(client.client)}</span></button>
                      <span class="client-meta">ID ${escapeHtml(client.clientId || "—")} · SID ${escapeHtml(client.sid || "—")}</span>
                    </td>
                    <td>${escapeHtml(client.clientStatus || "Active")}</td>
                    <td><strong>${formatMoney(client.escrow)}</strong></td>
                    <td>${readyDebtPills(client.readyDebts)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
      els.content.querySelectorAll(".client-link").forEach(button => {
        button.addEventListener("click", () => openClientDetail(button.dataset.clientKey));
      });
    }

    function priorityLabel(priority) {
      return priority === "high" ? "Alta prioridad" : priority === "medium" ? "Media prioridad" : "Prioridad normal";
    }

    function openClientDetail(clientKey) {
      state.selectedClientKey = clientKey;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function closeClientDetail() {
      state.selectedClientKey = "";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderClientProfile() {
      const client = state.report?.clients.find(item => item.key === state.selectedClientKey);
      if (!client) {
        state.selectedClientKey = "";
        render();
        return;
      }

      const sortedDebts = sortClientDebts(client.debts);
      const plan = buildRecommendedPlan(client, sortedDebts);
      const planKeys = new Set(plan.items.map(item => item.planKey));
      const totalBalance = sortedDebts.reduce((sum, debt) => sum + debt.balance, 0);
      const coveredIndividually = sortedDebts.filter(debt => debt.rule && client.escrow >= targetSettlement(debt)).length;

      els.reportTitle.textContent = "Perfil de cliente";
      els.reportSource.textContent = `${client.client} | ${priorityLabel(client.priority)}`;
      els.metrics.innerHTML = "";
      els.tabs.innerHTML = "";
      els.content.innerHTML = `
        <div class="profile-shell">
          <div class="profile-topbar">
            <button class="back-btn" type="button" id="backToList">Volver a la lista</button>
            <span class="pill ${client.hub ? "" : "missing"}">${client.hub ? escapeHtml(client.hub.stage || "HubSpot conectado") : "Sin deal en HubSpot"}</span>
          </div>

          <section class="profile-header">
            <div class="profile-title">
              <div>
                <h2>${escapeHtml(client.client)}</h2>
                <div class="profile-meta">
                  <span class="pill">ID ${escapeHtml(client.clientId || "-")}</span>
                  <span class="pill">SID ${escapeHtml(client.sid || "-")}</span>
                  <span class="pill">Mes ${client.month || "-"}</span>
                  <span class="pill ${client.tier}">${tierLabel(client.tier)}</span>
                </div>
              </div>
              <div class="detail-stat">
                <span>Escrow disponible</span>
                <strong>${formatMoney(client.escrow)}</strong>
              </div>
            </div>
            <div class="client-info-grid">
              <div class="client-info-item"><span>Status</span><strong>Active</strong></div>
              <div class="client-info-item"><span>HubSpot</span><strong>${client.hub ? escapeHtml(client.hub.stage || "Con deal") : "Sin deal"}</strong></div>
              <div class="client-info-item"><span>Owner</span><strong>${escapeHtml(client.hub?.owner || "-")}</strong></div>
              <div class="client-info-item"><span>Fuente</span><strong>DebtManager</strong></div>
            </div>
            <div class="detail-grid">
              <div class="detail-stat"><span>Balance total evaluado</span><strong>${formatMoney(totalBalance)}</strong></div>
              <div class="detail-stat"><span>Plan recomendado</span><strong>${formatMoney(plan.totalTarget)}</strong><div class="sub">${plan.items.length} cuenta(s), no excede escrow</div></div>
              <div class="detail-stat"><span>Escrow restante plan</span><strong>${formatMoney(plan.remainingEscrow)}</strong><div class="sub">Despues de apartar el target</div></div>
              <div class="detail-stat"><span>Cubren individualmente</span><strong>${coveredIndividually}</strong><div class="sub">No significa hacer todas juntas</div></div>
            </div>
          </section>

          <section class="work-section">
            <div class="work-section-head">
              <div>
                <h2>Plan recomendado</h2>
                <p>Selecciona cuentas sin gastar mas escrow del disponible. Usa el target conservador del acreedor.</p>
              </div>
              <span class="pill rule-ok">${plan.items.length} incluidas</span>
            </div>
            ${plan.items.length ? accountTable(client, plan.items, planKeys, "plan") : `<div class="empty">No hay cuentas que entren en el plan con las reglas actuales.</div>`}
          </section>

          <section class="work-section">
            <div class="work-section-head">
              <div>
                <h2>Cuentas del cliente</h2>
                <p>Vista de trabajo: porcentajes, target, notas del acreedor, meses y notas internas.</p>
              </div>
              <span class="pill">${sortedDebts.length} cuentas</span>
            </div>
            ${accountTable(client, sortedDebts, planKeys, "all")}
          </section>
        </div>
      `;
      document.getElementById("backToList").addEventListener("click", closeClientDetail);
      bindDecisionInputs();
    }

    function sortClientDebts(debts) {
      return [...debts].sort((a, b) => {
        if (b.ruleNegotiable !== a.ruleNegotiable) return Number(b.ruleNegotiable) - Number(a.ruleNegotiable);
        if ((b.percent >= 100) !== (a.percent >= 100)) return Number(b.percent >= 100) - Number(a.percent >= 100);
        return b.percent - a.percent;
      });
    }

    function tierLabel(tier) {
      return tier === "ready" ? "Listo ahora" : tier === "strong" ? "Fuerte" : tier === "viable" ? "Viable" : "Seguimiento";
    }

    function buildRecommendedPlan(client, debts) {
      const candidates = debts
        .filter(debt => debt.rule && targetSettlement(debt) > 0)
        .map(debt => ({ ...debt, planKey: debtPlanKey(debt), targetAmount: targetSettlement(debt) }))
        .sort((a, b) => {
          if ((b.percent >= 100) !== (a.percent >= 100)) return Number(b.percent >= 100) - Number(a.percent >= 100);
          if (a.targetAmount !== b.targetAmount) return a.targetAmount - b.targetAmount;
          return b.percent - a.percent;
        });
      let remaining = client.escrow;
      const items = [];
      for (const debt of candidates) {
        if (debt.targetAmount <= remaining) {
          items.push(debt);
          remaining -= debt.targetAmount;
        }
      }
      return {
        items,
        totalTarget: items.reduce((sum, debt) => sum + debt.targetAmount, 0),
        remainingEscrow: remaining
      };
    }

    function targetSettlement(debt) {
      if (!debt.rule || debt.estimateMax === null) return 0;
      return debt.estimateMax;
    }

    function debtPlanKey(debt) {
      return `${normalizeCreditorName(debt.creditor)}:${Math.round(debt.balance)}`;
    }

    function accountTable(client, debts, planKeys, tableId) {
      return `
        <div class="table-wrap">
          <table class="profile-table">
            <thead>
              <tr>
                <th>Plan</th>
                <th>Acreedor / cuenta</th>
                <th>Balance</th>
                <th>Escrow vs target</th>
                <th>% regla</th>
                <th>Target</th>
                <th>Pagos</th>
                <th>Info acreedor</th>
                <th>Meses</th>
                <th>Nota interna</th>
              </tr>
            </thead>
            <tbody>
              ${debts.map((debt, index) => accountRow(client, debt, index, planKeys, tableId)).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function accountRow(client, debt, index, planKeys, tableId) {
      const rule = debt.rule;
      const creditorParts = [
        debt.creditor,
        debt.originalCreditor && debt.originalCreditor !== debt.creditor ? `Original: ${debt.originalCreditor}` : "",
        debt.collectionAgency && debt.collectionAgency !== debt.creditor ? `Agencia: ${debt.collectionAgency}` : ""
      ].filter(Boolean);
      const decisionKey = decisionStorageKey(client, debt);
      const decision = loadDecision(decisionKey);
      const suggestedMonths = Number(decision.months || rule?.maxPayments || (debt.balance > 5000 ? 24 : debt.balance > 2000 ? 18 : 12));
      const targetAmount = targetSettlement(debt);
      const monthly = suggestedMonths ? (targetAmount || debt.balance) / suggestedMonths : 0;
      const inPlan = planKeys.has(debt.planKey || debtPlanKey(debt));
      const coverage = targetAmount ? client.escrow / targetAmount : 0;
      const needed = Math.max(targetAmount - client.escrow, 0);
      const planPill = !rule
        ? `<span class="pill rule-missing">Falta regla</span>`
        : inPlan
          ? `<span class="pill rule-ok">Incluir</span>`
          : coverage >= 1
            ? `<span class="pill rule-watch">Cubre sola</span>`
            : `<span class="pill missing">No alcanza</span>`;

      return `
        <tr class="${inPlan ? "plan-row" : ""}">
          <td>${planPill}</td>
          <td><span class="name">${escapeHtml(creditorParts[0] || "(acreedor)")}</span>${creditorParts.slice(1).map(part => `<br><span class="muted">${escapeHtml(part)}</span>`).join("")}</td>
          <td><strong>${formatMoney(debt.balance)}</strong></td>
          <td>${targetAmount ? `${Math.round(coverage * 100)}%` : "-"}<br><span class="muted">${needed ? `faltan ${formatMoney(needed)}` : `${formatMoney(client.escrow)} disponible`}</span></td>
          <td>${rule ? `<strong>${escapeHtml(rule.percentText || "-")}</strong><br><span class="muted">${escapeHtml(rule.difficulty || "")}</span>` : missingRuleInline()}</td>
          <td>${targetAmount ? formatMoney(targetAmount) : "-"}</td>
          <td>${escapeHtml(rule?.maxPayments || "-")}</td>
          <td>${rule ? ruleNoteCells(rule) : missingRuleCells()}</td>
          <td>
            <input class="mini-input" id="months-${tableId}-${index}" type="number" min="1" max="72" value="${suggestedMonths}" data-decision-key="${escapeHtml(decisionKey)}" data-field="months" data-amount="${targetAmount || debt.balance}">
            <div class="monthly-estimate"><strong data-monthly-for="${escapeHtml(decisionKey)}">${formatMoney(monthly)}</strong>/mes</div>
          </td>
          <td><textarea class="mini-textarea" id="notes-${tableId}-${index}" placeholder="Nota interna..." data-decision-key="${escapeHtml(decisionKey)}" data-field="notes">${escapeHtml(decision.notes || "")}</textarea></td>
        </tr>
      `;
    }

    function ruleNoteCells(rule) {
      return `
        <div class="note-cells">
          <div class="note-cell"><span>Respuesta</span><p>${escapeHtml(rule.responseTime || "No documentado")}</p></div>
          <div class="note-cell"><span>Carta</span><p>${escapeHtml(rule.requirements || "No documentado")}</p></div>
          <div class="note-cell note-cell-full"><span>Observaciones</span><p>${escapeHtml(rule.notes || "Sin observaciones")}</p></div>
        </div>
      `;
    }

    function missingRuleInline() {
      return `
        <div class="define-line">
          <strong>Definir regla</strong>
          <div class="define-fields"><span>%</span><span>pagos</span></div>
        </div>
      `;
    }

    function missingRuleCells() {
      return `
        <div class="note-cells">
          <div class="note-cell"><span>Respuesta</span><p>Por definir</p></div>
          <div class="note-cell"><span>Carta</span><p>Por definir</p></div>
          <div class="note-cell note-cell-full"><span>Observaciones</span><p>Crear regla del acreedor para calcular target y pagos.</p></div>
        </div>
      `;
    }

    function decisionStorageKey(client, debt) {
      return `settlementDecision:${client.key}:${normalizeCreditorName(debt.creditor)}:${Math.round(debt.balance)}`;
    }

    function loadDecision(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "{}");
      } catch {
        return {};
      }
    }

    function saveDecision(key, field, value) {
      const current = loadDecision(key);
      current[field] = value;
      localStorage.setItem(key, JSON.stringify(current));
    }

    function bindDecisionInputs() {
      els.content.querySelectorAll("[data-decision-key]").forEach(input => {
        input.addEventListener("input", event => {
          const key = event.target.dataset.decisionKey;
          const field = event.target.dataset.field;
          saveDecision(key, field, event.target.value);
          if (field === "months") {
            const months = Number(event.target.value || 0);
            const amount = Number(event.target.dataset.amount || 0);
            const target = [...els.content.querySelectorAll("[data-monthly-for]")].find(item => item.dataset.monthlyFor === key);
            if (target) target.textContent = months ? formatMoney(amount / months) : "-";
          }
        });
      });
    }

    els.searchInput.addEventListener("input", event => {
      state.search = event.target.value;
      if (!state.selectedClientKey) renderTable();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && state.selectedClientKey) closeClientDetail();
    });

    async function init() {
      render();
      await loadCreditorRules();
      try {
        await loadFromApi();
      } catch (error) {
        els.content.innerHTML = `<div class="section"><div class="empty">Error al conectar con FastAPI en ${API_URL}: ${escapeHtml(error.message)}</div></div>`;
      }
    }

    init();
  </script>
</body>
</html>
