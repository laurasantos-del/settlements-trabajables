  <meta charset="utf-8">

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@remix-run/router@1/dist/router.umd.js"></script>
  <script crossorigin src="https://unpkg.com/react-router@6/dist/umd/react-router.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-router-dom@6/dist/umd/react-router-dom.development.js"></script>
  <script>
    const { BrowserRouter, Routes, Route, NavLink, Link, useLocation, useNavigate, useParams } = ReactRouterDOM;
    const API_URL = "http://127.0.0.1:8000";
    const SETTLEMENT_CACHE_KEY = "settlements:lastReport";

    if (window.location.pathname.endsWith("/index.html")) {
      window.history.replaceState(null, "", "/");
    }

    function cleanText(value) {
      return String(value || "").trim();
    }

    function sameClientId(record, clientId) {
      return String(record?.["Client ID"] || "").trim() === String(clientId || "").trim();
    }

    function moneyToNumber(value) {
      if (typeof value === "number") return Number.isFinite(value) ? value : 0;
      const parsed = Number(String(value || "").replace(/\((.*)\)/, "-$1").replace(/[$,%\s,]/g, ""));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function apiRecords(data) {
      if (Array.isArray(data)) return data;
      return data?.records || [];
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(moneyToNumber(value));
    }

    function localDateISO(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatSpanishLongDate(date = new Date()) {
      const value = new Intl.DateTimeFormat("es-ES", { weekday: "long", day: "numeric", month: "long", year: "numeric" }).format(date);
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function parseDateValue(value) {
      const text = cleanText(value);
      if (!text) return null;
      if (/^\d{4}-\d{2}-\d{2}/.test(text)) return new Date(`${text.slice(0, 10)}T00:00:00`);
      const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if (match) {
        const year = Number(match[3].length === 2 ? `20${match[3]}` : match[3]);
        return new Date(year, Number(match[1]) - 1, Number(match[2]));
      }
      const parsed = new Date(text);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatPercent(value) {
      return `${Math.round(moneyToNumber(value))}%`;
    }

    function isValidClient(client) {
      return /^\d+$/.test(cleanText(client.clientId)) && cleanText(client.client) && cleanText(client.client) !== "(cliente)";
    }

    function debtCreditor(debt) {
      return cleanText(debt.creditor || debt.originalCreditor || debt.collectionAgency || "-");
    }

    function classifyClient(client) {
      const debts = client.debts || [];
      const ready = (client.readyDebts || []).filter(Boolean);
      const strong = debts.filter(debt => moneyToNumber(debt.percent) >= 70 && moneyToNumber(debt.percent) < 100);
      const viable = debts.filter(debt => moneyToNumber(debt.percent) >= 50 && moneyToNumber(debt.percent) < 70);
      const watch = debts.filter(debt => moneyToNumber(debt.percent) >= 40 && moneyToNumber(debt.percent) < 50);
      if (ready.length) return "ready";
      if (strong.length) return "strong";
      if (viable.length) return "viable";
      if (watch.length) return "watch";
      return "none";
    }

    function buildInteractionIndex(records) {
      const index = new Map();
      for (const row of records) {
        const clientId = String(row["Client ID"] || "").trim();
        if (clientId && !index.has(clientId)) index.set(clientId, row);
      }
      return index;
    }

    function escrowFromInteraction(interaction, fallback) {
      const cft = moneyToNumber(interaction?.["CFTPay Escrow Balance"]);
      const company = moneyToNumber(interaction?.["Company Bank Balance"]);
      return cft || company || moneyToNumber(fallback);
    }

    function negotiationOptionsForDebt(debt, escrow) {
      return [45, 55, 60].filter(percent => escrow >= moneyToNumber(debt.balance) * (percent / 100));
    }

    function enrichClientForNegotiation(client, interaction) {
      const negotiationEscrow = escrowFromInteraction(interaction, client.escrow);
      const pendingDebts = client.pendingDebts || [];
      const negotiableDebts = pendingDebts
        .map(debt => ({ ...debt, coveredOptions: negotiationOptionsForDebt(debt, negotiationEscrow) }))
        .filter(debt => debt.coveredOptions.length);
      const blockedDebts = pendingDebts.filter(debt => !negotiationOptionsForDebt(debt, negotiationEscrow).length);
      const negotiableOptions = [...new Set(negotiableDebts.flatMap(debt => debt.coveredOptions))].sort((a, b) => a - b);
      return {
        ...client,
        tier: classifyClient(client),
        interaction,
        negotiationEscrow,
        negotiableDebts,
        blockedDebts,
        negotiableOptions
      };
    }

    function getEnrichedClient(clients, interactions, clientId) {
      const interactionIndex = buildInteractionIndex(interactions);
      const client = (clients || []).find(item => cleanText(item.clientId) === cleanText(clientId));
      return client ? enrichClientForNegotiation(client, interactionIndex.get(cleanText(clientId))) : null;
    }

    function optionTone(percent) {
      if (percent === 45) return "green";
      if (percent === 55) return "yellow";
      return "orange";
    }

    function optionAmount(debt, percent) {
      return moneyToNumber(debt.balance) * (percent / 100);
    }

    function feeFromEnrolledDebt(value) {
      return moneyToNumber(value) * 0.29;
    }

    function paymentStatusTone(status) {
      const normalized = cleanText(status).toLowerCase();
      if (normalized === "cleared" || normalized === "y" || normalized === "pagado") return "green";
      if (normalized === "nsf" || normalized === "void") return "red";
      if (normalized === "pending") return "yellow";
      if (normalized === "n" || normalized === "pendiente") return "orange";
      if (normalized === "scheduled") return "gray";
      return "gray";
    }

    function statusTone(status) {
      const normalized = cleanText(status).toLowerCase();
      if (normalized === "active") return "green";
      if (normalized === "cancelled" || normalized === "cdp-cancelled") return "red";
      if (normalized === "nsf" || normalized === "nsf - first payment") return "orange";
      if (normalized === "graduated" || normalized === "cdp-graduated") return "blue";
      if (normalized === "on hold") return "yellow";
      if (normalized === "waiting for first payment") return "slate";
      return "gray";
    }

    function sameDay(value, iso = localDateISO()) {
      const date = parseDateValue(value);
      return date ? localDateISO(date) === iso : false;
    }

    function sameMonth(value, base = new Date()) {
      const date = parseDateValue(value);
      return date ? date.getFullYear() === base.getFullYear() && date.getMonth() === base.getMonth() : false;
    }

    function currentOrPreviousMonth(value, base = new Date()) {
      const date = parseDateValue(value);
      if (!date) return false;
      const currentIndex = base.getFullYear() * 12 + base.getMonth();
      const valueIndex = date.getFullYear() * 12 + date.getMonth();
      return valueIndex === currentIndex || valueIndex === currentIndex - 1;
    }

    function withinLastDays(value, days, base = new Date()) {
      const date = parseDateValue(value);
      if (!date) return false;
      const diff = Math.floor((parseDateValue(localDateISO(base)) - date) / 86400000);
      return diff >= 0 && diff <= days;
    }

    function financeName(row) {
      return cleanText(`${cleanText(row["First Name"] || row.Firstname)} ${cleanText(row["Last Name"] || row.Lastname)}`) || cleanText(row.Name) || cleanText(row["Client ID"]) || "-";
    }

    function compareDateDesc(field) {
      return (a, b) => (parseDateValue(b[field])?.getTime() || 0) - (parseDateValue(a[field])?.getTime() || 0);
    }

    function compareDateAsc(field) {
      return (a, b) => (parseDateValue(a[field])?.getTime() || 0) - (parseDateValue(b[field])?.getTime() || 0);
    }

    function uniqueBy(rows, getKey) {
      return Array.from(new Map(rows.map(row => [getKey(row), row]).filter(([key]) => cleanText(key))).values());
    }

    function enrichedSettlementClients(settlementsData, interactionRows) {
      const interactionIndex = buildInteractionIndex(interactionRows);
      return (settlementsData.clients || [])
        .filter(isValidClient)
        .map(client => enrichClientForNegotiation(client, interactionIndex.get(cleanText(client.clientId))));
    }

    function summaryDisplayValue(record, field, money) {
      const raw = cleanText(record?.[field]);
      if (!raw) return "-";
      return money ? formatMoney(raw) : new Intl.NumberFormat("en-US").format(moneyToNumber(raw));
    }

    function dateBadgeFor(value) {
      const date = parseDateValue(value);
      if (!date) return { tone: "gray", label: "Próximo" };
      const diff = localDateISO(date).localeCompare(localDateISO());
      if (diff < 0) return { tone: "red", label: "Vencido" };
      if (diff === 0) return { tone: "orange", label: "Hoy" };
      return { tone: "gray", label: "Próximo" };
    }

    function daysPastDue(value) {
      const date = parseDateValue(value);
      if (!date) return 0;
      const today = parseDateValue(localDateISO());
      return Math.floor((today - date) / 86400000);
    }

    function alertCategory(days) {
      if (days >= 1 && days <= 15) return { key: "follow", label: "En seguimiento", tone: "blue" };
      if (days <= 30) return { key: "medium", label: "Alerta Media", tone: "yellow" };
      if (days <= 60) return { key: "high", label: "Riesgo Alto", tone: "orange" };
      if (days <= 90) return { key: "possible", label: "Posible Broken", tone: "red" };
      return { key: "broken", label: "Broken Settlement", tone: "dark-red" };
    }

    function currentMonthLabel(date = new Date()) {
      const value = new Intl.DateTimeFormat("es-ES", { month: "long", year: "numeric" }).format(date);
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function creditorStatusTone(status) {
      const value = cleanText(status);
      if (["SP", "S", "S98_ReSettled"].includes(value)) return "green";
      if (["S2_LOA SENT", "S3_SCRUB", "S3_Resent LOA", "S66_Approved_waiting_for_SL", "S6_Request Approval", "S67_Payments to be Scheduled", "S82_ZBL Received", "S81_ZBL Requested", "S3_SettlementAssist"].includes(value)) return "orange";
      if (value === "S99_Broken Settlment") return "red";
      if (value === "L") return "blue";
      if (["VOIDED", "REMOVEPEND", "ADDPEND"].includes(value)) return "dark-red";
      return "gray";
    }

    function settlementPaymentLabel(status) {
      return cleanText(status) === "Y" ? "Pagado" : "Pendiente";
    }

    function useApiJson(path, fallbackValue) {
      const [state, setState] = React.useState({ data: fallbackValue, loading: true, error: "" });
      React.useEffect(() => {
        let cancelled = false;
        fetch(`${API_URL}${path}`)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
          })
          .then(data => !cancelled && setState({ data, loading: false, error: "" }))
          .catch(error => !cancelled && setState({ data: fallbackValue, loading: false, error: error.message }));
        return () => { cancelled = true; };
      }, [path]);
      return state;
    }

    function useSettlements() {
      const [state, setState] = React.useState({ data: { fecha: null, count: 0, clients: [] }, loading: true, error: "" });
      React.useEffect(() => {
        let cancelled = false;
        fetch(`${API_URL}/settlements`)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
          })
          .then(data => {
            try { localStorage.setItem(SETTLEMENT_CACHE_KEY, JSON.stringify(data)); } catch {}
            if (!cancelled) setState({ data, loading: false, error: "" });
          })
          .catch(error => {
            let backup = null;
            try { backup = JSON.parse(localStorage.getItem(SETTLEMENT_CACHE_KEY) || "null"); } catch {}
            if (!cancelled) setState({ data: backup || { fecha: null, count: 0, clients: [] }, loading: false, error: error.message });
          });
        return () => { cancelled = true; };
      }, []);
      return state;
    }

    function App() {
      return React.createElement(BrowserRouter, null, React.createElement(AppFrame));
    }

    function AppFrame() {
      const location = useLocation();
      const section = location.pathname.startsWith("/finance")
        ? "finance"
        : location.pathname.startsWith("/retencion")
          ? "retencion"
        : location.pathname.startsWith("/settlements") || location.pathname.startsWith("/settlement-payments") || location.pathname.startsWith("/cliente/")
          ? "settlements"
          : "main";
      return React.createElement("div", { className: "app-shell" },
        React.createElement("aside", { className: "sidebar" },
          React.createElement("div", null,
            section === "finance" ? React.createElement(FinanceSidebar) : section === "settlements" ? React.createElement(SettlementsSidebar) : section === "retencion" ? React.createElement(RetentionSidebar) : React.createElement(MainSidebar)
          ),
          React.createElement("div", { className: "sidebar-user" },
            React.createElement("div", null,
              React.createElement("strong", null, "Laura Santos"),
              React.createElement("span", null, "Operator")
            ),
            React.createElement("div", { className: "avatar" }, "LS")
          )
        ),
        React.createElement("main", { className: "layout" },
          React.createElement(Routes, null,
            React.createElement(Route, { path: "/", element: React.createElement(DashboardPage) }),
            React.createElement(Route, { path: "/settlements", element: React.createElement(SettlementsOverviewPage) }),
            React.createElement(Route, { path: "/settlements/negociables", element: React.createElement(SettlementsPage) }),
            React.createElement(Route, { path: "/settlements/creditor-status", element: React.createElement(CreditorStatusPage) }),
            React.createElement(Route, { path: "/settlements/settlements-mes", element: React.createElement(SettlementsMonthPage) }),
            React.createElement(Route, { path: "/settlements/settlements-futuros", element: React.createElement(FutureSettlementsPage) }),
            React.createElement(Route, { path: "/settlements/no-posibles", element: React.createElement(NoPossibleSettlementsPage) }),
            React.createElement(Route, { path: "/settlements/rotos", element: React.createElement(BrokenSettlementsPage) }),
            React.createElement(Route, { path: "/settlements/plan", element: React.createElement(SettlementPlanPage) }),
            React.createElement(Route, { path: "/settlement-payments", element: React.createElement(SettlementPaymentsPage) }),
            React.createElement(Route, { path: "/finance", element: React.createElement(FinanceOverviewPage) }),
            React.createElement(Route, { path: "/finance/client-deposits", element: React.createElement(FinanceClientDepositsPage) }),
            React.createElement(Route, { path: "/finance/pagos-acreedor", element: React.createElement(FinanceCreditorPaymentsPage) }),
            React.createElement(Route, { path: "/finance/revenue", element: React.createElement(FinanceRevenuePage) }),
            React.createElement(Route, { path: "/finance/alertas", element: React.createElement(FinanceAlertsPage) }),
            React.createElement(Route, { path: "/retencion", element: React.createElement(RetentionOverviewPage) }),
            React.createElement(Route, { path: "/retencion/upload", element: React.createElement(RetentionUploadPage) }),
            React.createElement(Route, { path: "/retencion/analisis", element: React.createElement(RetentionAnalysisPage) }),
            React.createElement(Route, { path: "/retencion/vendedores", element: React.createElement(RetentionSalesPage) }),
            React.createElement(Route, { path: "/retencion/clientes", element: React.createElement(RetentionClientsPage) }),
            React.createElement(Route, { path: "/clientes", element: React.createElement(PlaceholderPage, { title: "Clientes" }) }),
            React.createElement(Route, { path: "/settings", element: React.createElement(PlaceholderPage, { title: "Settings" }) }),
            React.createElement(Route, { path: "/cliente/:clientId", element: React.createElement(ClientDetailPage) }),
            React.createElement(Route, { path: "/cliente/:clientId/ledger/:creditor", element: React.createElement(LedgerPage) })
          )
        )
      );
    }

    function MainSidebar() {
      return React.createElement(React.Fragment, null,
        React.createElement("div", { className: "sidebar-brand" }, "Settlements App"),
        React.createElement("nav", { className: "sidebar-nav" },
          React.createElement(SidebarLink, { to: "/", end: true, icon: "📊", label: "Dashboard" }),

    function SettlementsSidebar() {
      return React.createElement(React.Fragment, null,
        React.createElement(SectionSidebarHeader, { label: "Settlements" }),

          React.createElement(SidebarLink, { to: "/settlements/creditor-status", icon: "🏦", label: "Creditor Status" }),

          React.createElement(SidebarLink, { to: "/settlements/rotos", icon: "💔", label: "Rotos" }),
          React.createElement(SidebarLink, { to: "/settlements/plan", icon: "📋", label: "Settlement Plan" }),
          React.createElement(SidebarLink, { to: "/settlements/negociables", icon: "🤝", label: "Negociables" }),
          React.createElement(SidebarLink, { to: "/settlement-payments", icon: "💰", label: "Settlement Payments" })
        )
      );
    }

    function RetentionSidebar() {
      return React.createElement(React.Fragment, null,
        React.createElement(SectionSidebarHeader, { label: "Retención" }),
        React.createElement("nav", { className: "sidebar-nav" },
          React.createElement(SidebarLink, { to: "/retencion", end: true, icon: "📊", label: "Overview" }),
          React.createElement(SidebarLink, { to: "/retencion/upload", icon: "📁", label: "Cargar CSV" }),

          React.createElement(SidebarLink, { to: "/retencion/vendedores", icon: "👥", label: "Por Vendedor" }),

    function SectionSidebarHeader({ label }) {
      return React.createElement(Link, { to: "/", className: "section-sidebar-header" }, `← ${label}`);
    }

    function SidebarLink({ to, icon, label, end }) {
      return React.createElement(NavLink, { to, end, className: ({ isActive }) => isActive ? "sidebar-link active" : "sidebar-link" },
        React.createElement("span", { className: "sidebar-icon" }, icon),

    function SidebarSubLink({ to, label, end }) {
      return React.createElement(NavLink, { to, end, className: ({ isActive }) => isActive ? "sidebar-subitem active" : "sidebar-subitem" }, label);

    function PlaceholderPage({ title }) {
      return React.createElement("section", { className: "placeholder-page" },

            React.createElement("div", { className: "page-breadcrumb" }, `${title} / Próximamente`),
            React.createElement("h1", null, title),
            React.createElement("p", null, "Vista placeholder por ahora.")
          )
        )
      );
    }

    function Breadcrumb() {
      const location = useLocation();
      const isDetail = location.pathname.startsWith("/cliente/");
      const settlements = useSettlements();
      const pathParts = location.pathname.split("/").filter(Boolean);
      const clientId = isDetail ? pathParts[1] : "";
      const client = (settlements.data.clients || []).find(item => cleanText(item.clientId) === cleanText(clientId));
      const isLedger = location.pathname.includes("/ledger/");
      const current = location.pathname === "/settlement-payments" ? "Settlement Payments" : location.pathname === "/settlements" ? "Settlements" : isLedger ? "Ledger" : isDetail ? "Detalle cliente" : "Dashboard";
      return React.createElement("div", { className: "breadcrumb" },
        React.createElement("div", { className: "breadcrumb-inner" },
          React.createElement(Link, { to: "/" }, "Dashboard"),
          React.createElement("span", null, ">"),
          isDetail ? React.createElement(React.Fragment, null,
            React.createElement(Link, { to: "/settlements" }, "Settlements"),
            React.createElement("span", null, ">"),
            React.createElement("span", null, isLedger ? `${client?.client || "Cliente"} > Ledger` : client?.client || current)
          ) : React.createElement("span", null, current)
        )
      );
    }

    function DashboardPage() {
      const today = localDateISO();
      const enrollments = useApiJson("/data/new-enrollments", { records: [] });
      const expected = useApiJson("/data/expected-client-payments", { records: [] });
      const settlementPayments = useApiJson("/data/settlement-payment-report", { records: [] });
      const interactions = useApiJson("/data/client-interactions", { records: [] });
      const settlements = useSettlements();

      const enrollmentRows = apiRecords(enrollments.data);
      const expectedRows = apiRecords(expected.data);
      const settlementRows = apiRecords(settlementPayments.data);
      const interactionRows = apiRecords(interactions.data);
      const clients = enrichedSettlementClients(settlements.data, interactionRows);
      const negotiableCount = clients.filter(client => client.negotiableOptions.length).length;

      const activeCount = interactionRows.filter(row => cleanText(row["Client Status"]) === "Active").length;
      const nsfCount = interactionRows.filter(row => {
        const status = cleanText(row["Client Status"]).toLowerCase();
        return status === "nsf" || status === "nsf - first payment";
      }).length;
      const todaysEnrollments = enrollmentRows.filter(row => {
        const enrollDate = cleanText(row["Enroll Date"]);
        const leadNumber = cleanText(row["Lead Number"]);
        const statusDate = cleanText(row["Status Date"]);
        return enrollDate && enrollDate !== leadNumber ? enrollDate === today : statusDate === today;
      });
      const enrolledDebtTotal = enrollmentRows.reduce((sum, row) => sum + moneyToNumber(row["Total Debt"]), 0);
      const todaysScheduledDeposits = expectedRows.filter(row => cleanText(row["Scheduled Draft Date"]) === today && cleanText(row["Payment Status"]) === "Scheduled");
      const todaysDeposits = expectedRows.filter(row => cleanText(row["Scheduled Draft Date"]) === today);

    function parseCsv(text) {
      const rows = [];
      let row = [], value = "", quoted = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];
        if (char === '"' && quoted && next === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(value.trim());
          value = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (value || row.length) {
            row.push(value.trim());
            rows.push(row);
          }
          value = "";
          row = [];
          if (char === "\r" && next === "\n") i++;
        } else {
          value += char;
        }
      }
      if (value || row.length) {
        row.push(value.trim());
        rows.push(row);
      }
      const headers = rows.shift() || [];
      return rows.filter(cells => cells.some(Boolean)).map(cells => Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""])));
    }

    function cancellationReasons(rows) {
      const translations = {

        "CAN Insatisfaccion con el servicio": "Dissatisfied with service",
        "CAN Problemas financieros": "Financial hardship",

      const map = new Map();
      for (const row of rows.filter(row => cleanText(row["Client Status"]).toLowerCase().includes("cancelled"))) {
        const reason = translations[cleanText(row["Cancellation Reasons"])] || cleanText(row["Cancellation Reasons"]) || "Unknown";
        map.set(reason, (map.get(reason) || 0) + 1);

      return Array.from(map.entries()).sort((a, b) => b[1] - a[1]).slice(0, 12).map(([label, value]) => ({ label, value }));

    function salesPerformance(rows) {
      const grouped = new Map();
      for (const row of rows) {

        if (!grouped.has(rep)) grouped.set(rep, []);
        grouped.get(rep).push(row);
      }
      return Array.from(grouped.entries()).map(([rep, items]) => {
        const cancelled = items.filter(row => row._segment.includes("cancelled"));
        const active = items.filter(row => row._segment === "active_paying" || row._segment === "no_pay_active");
        const graduated = items.filter(row => row._segment === "graduated");
        const debt = items.reduce((sum, row) => sum + moneyToNumber(row["Total Enrolled Debt"]), 0);
        const retainedDebt = [...active, ...graduated].reduce((sum, row) => sum + moneyToNumber(row["Total Enrolled Debt"]), 0);
        return {
          rep,
          total: items.length,
          active: active.length,
          noPay: items.filter(row => row._segment === "no_pay_cancelled").length,
          early: items.filter(row => row._segment === "paid_1_2_cancelled").length,
          late: items.filter(row => row._segment === "paid_3plus_cancelled").length,
          graduated: graduated.length,

                  min: "30",
                  max: "80",
                  value: customPercent,
                  onChange: event => setCustomPercent(event.target.value),
                  placeholder: "30-80"
                })
              )
            ),
            React.createElement("div", { className: "ledger-summary" },
              React.createElement(DetailStat, { label: "Monto negociación", value: formatMoney(negotiatedAmount), tone: "orange" }),
              React.createElement(DetailStat, { label: "Fee", value: formatMoney(fee) }),
              React.createElement(DetailStat, { label: "Cuotas sugeridas", value: `3 x ${formatMoney(creditorInstallment)}` })
            )
          )
        ),
        React.createElement(Card, { title: "Proyección mes a mes" },
          React.createElement("div", { className: "table-wrap" },
            React.createElement("table", null,
              React.createElement("thead", null, React.createElement("tr", null, ["Mes", "Pago mensual entrante", "Pago a acreedor", "Fee del mes", "Balance inicio", "Balance fin", "Estado"].map(header => React.createElement("th", { key: header }, header)))),
              React.createElement("tbody", null, projection.map(row => React.createElement("tr", { key: row.month },
                React.createElement("td", null, `Mes ${row.month}`),
                React.createElement("td", null, formatMoney(row.monthlyPayment)),
                React.createElement("td", null, formatMoney(row.creditorPayment)),
                React.createElement("td", null, formatMoney(row.feePayment)),
                React.createElement("td", null, formatMoney(row.balanceStart)),
                React.createElement("td", { className: row.balanceEnd < 0 ? "negative-balance" : row.balanceEnd < 200 ? "risk-balance" : "money-green" }, formatMoney(row.balanceEnd)),
                React.createElement("td", null, React.createElement(Badge, { tone: row.balanceEnd < 0 ? "red" : row.balanceEnd < 200 ? "orange" : "green" }, row.balanceEnd < 0 ? "NEGATIVO ⚠" : row.balanceEnd < 200 ? "RIESGO" : "OK"))
              )))
            )
          )
        ),
        negativeMonth
          ? React.createElement("div", { className: "danger-banner" }, `⚠ Si el cliente falla el pago de Mes ${negativeMonth.month}, el balance cae a ${formatMoney(negativeMonth.balanceEnd)}. El deal con ${decodedCreditor} deberá cancelarse.`)
          : React.createElement("div", { className: "success-banner" }, "✓ El cliente puede completar este deal sin quedar en negativo.")
      );
    }

    function buildLedgerProjection(startBalance, monthlyPayment, creditorInstallment, feeInstallment) {
      const rows = [];
      let balance = moneyToNumber(startBalance);
      for (let month = 1; month <= 12; month++) {
        const balanceStart = balance;
        const creditorPayment = month <= 3 ? creditorInstallment : 0;
        const feePayment = month <= 3 ? feeInstallment : 0;
        const balanceEnd = balanceStart + monthlyPayment - creditorPayment - feePayment;
        rows.push({ month, balanceStart, monthlyPayment, creditorPayment, feePayment, balanceEnd });
        balance = balanceEnd;
      }
      return rows;
    }

    function DebtCard({ title, tone, debts }) {
      return React.createElement(Card, { title, headerTone: "orange" },
        debts.length ? React.createElement("div", { className: "table-wrap compact" },
          React.createElement("table", null,
            React.createElement("thead", null, React.createElement("tr", null,
              ["Acreedor", "Balance", "% Fondos"].map(header => React.createElement("th", { key: header }, header))
            )),
            React.createElement("tbody", null, debts.map((debt, index) => React.createElement("tr", { key: index },
              React.createElement("td", null, React.createElement(Badge, { tone }, debtCreditor(debt))),
              React.createElement("td", { className: tone === "green" ? "money-green" : "amount-cell" }, formatMoney(debt.balance)),
              React.createElement("td", { className: tone === "green" ? "money-green" : "amount-cell" }, formatPercent(debt.percent))
            )))
          )
        ) : React.createElement(EmptyState)
      );
    }

    function PendingDebtsCard({ debts, paymentRows, loading }) {
      if (loading) return React.createElement(Card, { title: "Deudas pendientes", headerTone: "orange" }, React.createElement(Loading));
      return React.createElement(Card, { title: "Deudas pendientes", headerTone: "orange" },
        debts.length ? React.createElement("div", { className: "table-wrap" },
          React.createElement("table", null,
            React.createElement("thead", null, React.createElement("tr", null,
              ["Acreedor", "Balance", "% Fondos", "Total Debt", "Balance actual", "Pagos", "Payment Status"].map(header => React.createElement("th", { key: header }, header))
            )),
            React.createElement("tbody", null, debts.map((debt, index) => {
              const creditor = debtCreditor(debt);
              const reportRow = findPaymentRowForDebt(paymentRows, creditor);
              return React.createElement("tr", { key: index },
                React.createElement("td", null, React.createElement(Badge, { tone: "orange" }, creditor)),
                React.createElement("td", { className: "amount-cell" }, formatMoney(debt.balance)),
                React.createElement("td", { className: "amount-cell" }, formatPercent(debt.percent)),
                React.createElement("td", null, reportRow ? formatMoney(reportRow["Total Debt"]) : "-"),
                React.createElement("td", null, reportRow ? formatMoney(reportRow["Balance Current"]) : "-"),
                React.createElement("td", null, reportRow ? `${reportRow["Completed Payments"] || "0"} / ${reportRow["Total Number Of Payments"] || "-"}` : "-"),
                React.createElement("td", null, reportRow ? React.createElement(Badge, { tone: paymentStatusTone(reportRow["Payment Status"]) }, settlementPaymentLabel(reportRow["Payment Status"])) : "-")
              );
            }))
          )
        ) : React.createElement(EmptyState)
      );
    }

    function findPaymentRowForDebt(rows, creditor) {
      const normalizedCreditor = cleanText(creditor).toLowerCase();
      return rows.find(row => {
        const reportCreditor = cleanText(row["Current Creditor"]).toLowerCase();
        return reportCreditor && (reportCreditor.includes(normalizedCreditor) || normalizedCreditor.includes(reportCreditor.replace(/\s*\([^)]*\)\s*/g, "").trim()));
      });
    }

    function InteractionsTable({ rows, loading }) {
      if (loading) return React.createElement(Loading);
      if (!rows.length) return React.createElement(EmptyState);
      return React.createElement("div", { className: "table-wrap" },
        React.createElement("table", null,
          React.createElement("thead", null, React.createElement("tr", null,
            ["File Status", "Pago mensual", "Deuda enrollada", "Última nota", "Fecha"].map(header => React.createElement("th", { key: header }, header))
          )),
          React.createElement("tbody", null, rows.map((row, index) => React.createElement("tr", { key: index },
            React.createElement("td", null, React.createElement(Badge, { tone: "gray" }, row["File Status"] || "-")),
            React.createElement("td", null, formatMoney(row["Monthly Payment Amount"])),
            React.createElement("td", null, formatMoney(row["Total Enrolled Debt"])),
            React.createElement("td", { className: "note-cell" }, row["Last Note"] || "-"),
            React.createElement("td", null, row["Last Note Date"] || "-")
          )))
        )
      );
    }

    function ExpectedPaymentsTable({ rows, loading }) {
      if (loading) return React.createElement(Loading);
      if (!rows.length) return React.createElement(EmptyState);
      return React.createElement("div", { className: "table-wrap" },
        React.createElement("table", null,
          React.createElement("thead", null, React.createElement("tr", null,
            ["Fecha programada", "Monto", "Status", "Fecha procesada"].map(header => React.createElement("th", { key: header }, header))
          )),
          React.createElement("tbody", null, rows.map((row, index) => React.createElement("tr", { key: index },
            React.createElement("td", null, row["Scheduled Draft Date"] || "-"),
            React.createElement("td", { className: "amount-cell" }, formatMoney(row.Amount)),
            React.createElement("td", null, React.createElement(Badge, { tone: paymentStatusTone(row["Payment Status"]) }, row["Payment Status"] || "-")),
            React.createElement("td", null, row["Processed Draft Date"] || "-")
          )))
        )
      );
    }

    function PaymentHistoryTable({ rows, loading }) {
      if (loading) return React.createElement(Loading);
      if (!rows.length) return React.createElement(EmptyState);
      return React.createElement("div", { className: "table-wrap" },
        React.createElement("table", null,
          React.createElement("thead", null, React.createElement("tr", null,
            ["Fecha programada", "Monto", "Status", "Fecha procesada", "Primer draft"].map(header => React.createElement("th", { key: header }, header))
          )),
          React.createElement("tbody", null, rows.map((row, index) => React.createElement("tr", { key: index },
            React.createElement("td", null, row["Scheduled Draft Date"] || "-"),
            React.createElement("td", { className: "amount-cell" }, formatMoney(row.Amount)),
            React.createElement("td", null, React.createElement(Badge, { tone: paymentStatusTone(row["Payment Status"]) }, row["Payment Status"] || "-")),
            React.createElement("td", null, row["Processed Draft Date"] || "-"),
            React.createElement("td", null, row["First Draft"] || "-")
          )))
        )
      );
    }

    function Card({ title, children, headerTone }) {
      return React.createElement("section", { className: "card" },
        title ? React.createElement("div", { className: `card-header ${headerTone || ""}` }, React.createElement("h2", null, title)) : null,
        React.createElement("div", { className: "card-body" }, children)
      );
    }

    function Stat({ label, value, tone }) {
      return React.createElement("div", { className: "stat" },
        React.createElement("span", null, label),
        React.createElement("strong", { className: tone || "" }, value)
      );
    }

    function DetailStat({ label, value, tone }) {
      return React.createElement("div", { className: "detail-stat" },
        React.createElement("span", null, label),
        React.createElement("strong", { className: tone || "" }, value)
      );
    }

    function Tab({ active, onClick, children }) {
      return React.createElement("button", { className: active ? "forth-tab active" : "forth-tab", onClick }, children);
    }

    function Badge({ tone, children }) {
      return React.createElement("span", { className: `badge ${tone || "gray"}` }, children);
    }

    function renderOptionBadges(options) {
      if (!options.length) return React.createElement("span", { className: "muted" }, "-");
      return options.map(percent => React.createElement(Badge, { tone: optionTone(percent), key: percent }, `${percent}%`));
    }

    function renderDebtPills(debts, tone) {
      if (!debts.length) return React.createElement("span", { className: "muted" }, "-");
      return debts.slice(0, 4).map((debt, index) => React.createElement(Badge, { tone, key: `${debtCreditor(debt)}-${index}` }, `${debtCreditor(debt)} ${formatMoney(debt.balance)}`));
    }

    function Loading() {
      return React.createElement("div", { className: "state-text" }, "Cargando...");
    }

    function SectionLoading() {
      return React.createElement("div", { className: "section-loading" },
        React.createElement("span", { className: "spinner" }),
        React.createElement("span", null, "Cargando...")
      );
    }

    function Unavailable() {
      return React.createElement("div", { className: "state-text" }, "No disponible");
    }

    function EmptyState({ text }) {
      return React.createElement("div", { className: "state-text" }, text || "No hay datos disponibles");
    }

    function ErrorBanner() {
      return React.createElement("div", { className: "warning-banner" }, "Sin conexión — mostrando último reporte disponible");
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
